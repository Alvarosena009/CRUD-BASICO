<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarefa</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
            padding: 40px 20px;
        }
        .card {
            background: var(--card);
            padding: 28px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            border: 1px solid var(--border);
            max-width: 560px;
            margin: 0 auto;
        }
        h1 { margin-top: 0; font-size: 26px; }
        p { color: var(--muted); }
        label { display: block; margin-top: 14px; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            margin-top: 6px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
        }
        .actions { display: flex; gap: 10px; margin-top: 18px; }
        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn.secondary { background: #6b7280; }
        .btn:hover { background: var(--primary-dark); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Editar Tarefa</h1>
        <form action="{{ url_for('atualizar', id=tarefa[0]) }}" method="post">
            <label for="titulo">Título</label>
            <input type="text" id="titulo" name="titulo" value="{{ tarefa[1] }}" required>

            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" rows="4">{{ tarefa[2] }}</textarea>

            <label for="prioridade">Prioridade</label>
            <select id="prioridade" name="prioridade">
                <option value="Baixa" {% if tarefa[3] == 'Baixa' %}selected{% endif %}>Baixa</option>
                <option value="Média" {% if tarefa[3] == 'Média' %}selected{% endif %}>Média</option>
                <option value="Alta" {% if tarefa[3] == 'Alta' %}selected{% endif %}>Alta</option>
            </select>

            <label for="status">Status</label>
            <select id="status" name="status">
                <option value="Pendente" {% if tarefa[4] == 'Pendente' %}selected{% endif %}>Pendente</option>
                <option value="Em andamento" {% if tarefa[4] == 'Em andamento' %}selected{% endif %}>Em andamento</option>
                <option value="Concluída" {% if tarefa[4] == 'Concluída' %}selected{% endif %}>Concluída</option>
            </select>

            <div class="actions">
                <button class="btn" type="submit">Atualizar tarefa</button>
                <a class="btn secondary" href="{{ url_for('index') }}">Voltar</a>
            </div>
        </form>
    </div>
</body>
</html>
