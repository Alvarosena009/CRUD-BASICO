<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarefa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .form-header p {
            color: var(--muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        @media (max-width: 600px) {
            .form-card { padding: 25px; }
            .form-row { grid-template-columns: 1fr; }
            .form-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1><i class="fas fa-edit"></i> Editar Tarefa</h1>
                <p>Atualize os detalhes da sua tarefa</p>
            </div>

            <form action="{{ url_for('atualizar', id=tarefa[0]) }}" method="post">
                <div class="form-group">
                    <label for="titulo"><i class="fas fa-heading"></i> Título *</label>
                    <input type="text" id="titulo" name="titulo" value="{{ tarefa[1] }}" required>
                </div>

                <div class="form-group">
                    <label for="descricao"><i class="fas fa-align-left"></i> Descrição</label>
                    <textarea id="descricao" name="descricao">{{ tarefa[2] }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prioridade"><i class="fas fa-flag"></i> Prioridade</label>
                        <select id="prioridade" name="prioridade">
                            <option value="Baixa" {% if tarefa[3] == 'Baixa' %}selected{% endif %}>Baixa</option>
                            <option value="Média" {% if tarefa[3] == 'Média' %}selected{% endif %}>Média</option>
                            <option value="Alta" {% if tarefa[3] == 'Alta' %}selected{% endif %}>Alta</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status"><i class="fas fa-tasks"></i> Status</label>
                        <select id="status" name="status">
                            <option value="Pendente" {% if tarefa[4] == 'Pendente' %}selected{% endif %}>Pendente</option>
                            <option value="Em andamento" {% if tarefa[4] == 'Em andamento' %}selected{% endif %}>Em andamento</option>
                            <option value="Concluída" {% if tarefa[4] == 'Concluída' %}selected{% endif %}>Concluída</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-save"></i> Atualizar
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
